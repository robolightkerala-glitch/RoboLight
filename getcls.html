<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOLIGHT | Access Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Access Terminal Box Container */
        .gateway-container {
            background: #101625;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00d2ff 0%, #0052cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* 8-Digit Input Box Styling */
        .input-group {
            margin-bottom: 25px;
        }

        .code-input {
            width: 100%;
            background: #162035;
            border: 2px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            font-size: 22px;
            color: #ffffff;
            text-align: center;
            letter-spacing: 6px;
            font-weight: bold;
            outline: none;
            transition: all 0.3s ease;
        }

        .code-input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .code-input::placeholder {
            letter-spacing: normal;
            font-size: 14px;
            color: #64748b;
            font-weight: normal;
        }

        /* Control Actions */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-back {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #1e293b;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: #162035;
            color: #ffffff;
            border-color: #64748b;
        }
    </style>
</head>
<body>

    <div class="gateway-container">
        <div class="logo">ROBOLIGHT</div>
        <h2>Enter Class Access Code</h2>
        
        <!-- Input Subroutine -->
        <div class="input-group">
            <input 
                type="text" 
                class="code-input" 
                id="classCode" 
                maxlength="8" 
                placeholder="00000000"
                autocomplete="off"
                oninput="validateNumeric(this)"
            >
        </div>

        <!-- Submission and Navigation Options -->
        <button class="btn-submit" onclick="submitClassCode()">Get Class</button>
        <button class="btn-back" onclick="goBack()">Back to Dashboard</button>
    </div>

    <script>
        // Restricts inputs to numbers only
        function validateNumeric(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
        }

        // Processing Action Matrix
        function submitClassCode() {
            const codeField = document.getElementById('classCode');
            const enteredCode = codeField.value;

            if (enteredCode.length !== 8) {
                alert("Access Denied: Please enter a valid 8-digit class verification code.");
                return;
            }

            alert(`Verifying access key: [${enteredCode}]...\nSyncing your class stream data!`);
            // Add redirect logic here if needed:
            // window.location.href = "https://yourlink.com/class?id=" + enteredCode;
        }

        function goBack() {
            // Returns back to the primary workspace page
            window.history.back();
            // Or use direct link fallback if needed: window.location.href = "index.html";
        }
    </script>
</body>
</html>
