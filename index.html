<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | ROBOLIGHT Institute</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at center, #112244 0%, #0b0f19 100%);
        }

        .container {
            background: #101625;
            border: 2px solid #0052cc;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 82, 204, 0.3);
            max-width: 450px;
            width: 100%;
        }
        
        /* Branding Header */
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00d2ff 0%, #0052cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .brand-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00d2ff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: #162035;
            border: 1px solid #1e293b;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* Input placeholders */
        ::placeholder {
            color: #64748b;
        }

        /* Action Buttons */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0052cc 0%, #00a3ff 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 82, 204, 0.4);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 163, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Header -->
        <div class="brand-header">
            <div class="brand-logo">ROBOLIGHT</div>
            <p>Robotics Institute Onboarding</p>
        </div>

        <!-- Onboarding Form -->
        <form id="getStartedForm">
            <!-- Name Input -->
            <div class="input-group">
                <label for="operatorName">STUDENT NAME</label>
                <input type="text" id="operatorName" placeholder="Enter your full name" required>
            </div>

            <!-- Age Input -->
            <div class="input-group">
                <label for="operatorAge">AGE</label>
                <input type="number" id="operatorAge" placeholder="Enter your age" min="5" max="100" required>
            </div>

            <!-- Submit Action -->
            <button type="submit"></button><a href="main.html" style="color: white; text-decoration: none;">Launch Core Dashboard</a></button>
        </form>
    </div>

    <script>
        document.getElementById('getStartedForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('operatorName').value;
            const age = document.getElementById('operatorAge').value;
            
            alert(`Profile Created successfully!\nWelcome to ROBOLIGHT Institute, ${name} (${age}).`);
            
            // This redirects straight to your main page layout file!
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
