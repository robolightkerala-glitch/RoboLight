<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | ROBOLIGHT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            max-width: 450px;
            width: 100%;
        }
        
        /* Branding Identity */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .brand-header p {
            color: #777;
            font-size: 14px;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Brand Header -->
        <div class="brand-header">
            <textarea class="brand-logo" rows="1" readonly color="white">ROBOLIGHT</textarea>
            <p>Create your operator profile to begin</p>
        </div>

        <!-- Setup Form -->
        <form id="startForm">
            <!-- Name Input -->
            <div class="input-group">
                <label for="operatorName">Full Name</label>
                <input type="text" id="operatorName" placeholder="e.g. Alex Mercer" required>
            </div>

            <!-- Age Input -->
            <div class="input-group">
                <label for="operatorAge">Age</label>
                <input type="number" id="operatorAge" placeholder="e.g. 24" min="1" max="120" required>
            </div>

            <!-- Launch Action Button -->
            <button type="submit"><a href="main.html">Launch Dashboard</a></button>
        </form>
    </div>

    <script>
        document.getElementById('startForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('operatorName').value;
            const age = document.getElementById('operatorAge').value;
            
            // Simple submission callback demo
            alert(`Welcome to ROBOLIGHT, ${name} (${age})!\nYour control profile has been created successfully.`);
            
            // Optional: Reset form fields after alert
            this.reset();
        });
    </script>
</body>
</html>
